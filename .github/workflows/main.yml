name: Build and Push Docker Images

on:
  push:
    branches: [ "master", "main" ] 

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn clean package -DskipTests
    
    - name: Build Docker images
      run: |
        docker build -t task-tracker-backend ./task-tracker-backend
        docker build -t task-tracker-frontend ./task-tracker-frontend
        docker build -t task-tracker-email-sender ./task-tracker-email-sender
        docker build -t task-tracker-scheduler ./task-tracker-scheduler