<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .task-card { cursor: pointer; transition: transform 0.2s; }
        .task-card:hover { transform: scale(1.02); }
        .done-task { text-decoration: line-through; color: gray; }
        #main-content { display: none; } 
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">Task Tracker (Trello Style)</a>
            <div class="d-flex" id="nav-auth-zone">
                </div>
        </div>
    </nav>

    <div class="container" id="main-content">
        <div class="row mb-4">
            <div class="col-md-8 offset-md-2">
                <div class="input-group">
                    <input type="text" id="new-task-title" class="form-control" placeholder="Заголовок новой задачи...">
                    <button class="btn btn-primary" id="btn-add-task">Добавить</button>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <div class="card">
                    <div class="card-header bg-warning text-dark fw-bold">В работе</div>
                    <div class="card-body" id="todo-tasks-list">
                        </div>
                </div>
            </div>

            <div class="col-md-6 mb-3">
                <div class="card">
                    <div class="card-header bg-success text-white fw-bold">Выполнено</div>
                    <div class="card-body" id="done-tasks-list">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <div class="container text-center py-5" id="guest-content">
        <h2>Добро пожаловать в Task Tracker</h2>
        <p class="text-muted">Пожалуйста, войдите или зарегистрируйтесь, чтобы управлять своими задачами.</p>
    </div>


    <div class="modal fade" id="loginModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Авторизация</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="login-form">
                    <div class="modal-body">
                        <div class="alert alert-danger d-none" id="login-error"></div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Пароль</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="submit" class="btn btn-primary w-100">Войти</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade" id="registerModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Регистрация</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="register-form">
                    <div class="modal-body">
                        <div class="alert alert-danger d-none" id="register-error"></div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Пароль</label>
                            <div class="input-group">
                                <input type="password" id="reg-password" name="password" class="form-control" required>
                                <button class="btn btn-outline-secondary toggle-password" type="button" data-target="reg-password">👁️</button>
                             </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Повторите пароль</label>
                            <div class="input-group">
                                <input type="password" id="reg-password-repeat" name="password-repeat" class="form-control" required>
                                <button class="btn btn-outline-secondary toggle-password" type="button" data-target="reg-password-repeat">👁️</button>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="submit" class="btn btn-success w-100">Зарегистрироваться</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade" id="taskModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Редактирование задачи</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="edit-task-id">
                    
                    <div class="mb-3">
                        <label class="form-label">Заголовок</label>
                        <input type="text" id="edit-task-title" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Описание</label>
                        <textarea id="edit-task-desc" class="form-control" rows="4"></textarea>
                    </div>
                    <div class="form-check mb-3">
                        <input class="form-check-input" type="checkbox" id="edit-task-status">
                        <label class="form-check-label" for="edit-task-status">Пометить как выполненную</label>
                    </div>
                </div>
                <div class="modal-footer d-flex justify-content-between">
                    <button type="button" class="btn btn-danger" id="btn-delete-task">Удалить задачу</button>
                    <small class="text-muted" id="auto-save-status">Все изменения сохраняются автоматически</small>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
