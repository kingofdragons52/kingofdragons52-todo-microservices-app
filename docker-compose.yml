version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: task-tracker-postgres
    environment:
      POSTGRES_DB: task_tracker_db
      POSTGRES_USER: tracker_user
      POSTGRES_PASSWORD: tracker_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracker_user -d task_tracker_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - tracker-network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: task-tracker-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    networks:
      - tracker-network

  mailhog:
    image: mailhog/mailhog:latest
    container_name: task-tracker-mailhog
    ports:
      - "8025:8025"
    networks:
      - tracker-network

  backend:
    build: ./task-tracker-backend
    container_name: task-tracker-backend
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tracker-network

  email-sender:
    build: ./task-tracker-email-sender
    container_name: task-tracker-email-sender
    depends_on:
      - kafka
    networks:
      - tracker-network

  scheduler:
    build: ./task-tracker-scheduler
    container_name: task-tracker-scheduler
    depends_on:
      - backend
    networks:
      - tracker-network

  frontend:
    build: ./task-tracker-frontend
    container_name: task-tracker-frontend
    ports:
      - "80:80"
    networks:
      - tracker-network

networks:
  tracker-network:
    driver: bridge